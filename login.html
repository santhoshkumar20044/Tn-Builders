<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN BUILDERS - Google Sign In</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #0d47a1; 
            --accent: #ffb300; 
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            height: 100vh; 
            background: #020617; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            perspective: 1000px;
        }

        /* Animated Video/Ambient Background */
        #bg-video { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; 
            filter: brightness(0.2) contrast(1.2); 
        }

        /* 3D Container with Floating Animation */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            transform-style: preserve-3d;
            animation: floating 6s ease-in-out infinite;
            position: relative;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-20px) rotateX(-2deg); }
        }

        .glow {
            position: absolute;
            width: 200px; height: 200px;
            background: var(--primary);
            filter: blur(100px);
            z-index: -1;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
        }

        .icon-box {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--primary), #1e3a8a);
            margin: 0 auto 30px;
            border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2em; color: var(--accent);
            transform: translateZ(50px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        h2 { color: #fff; margin-bottom: 10px; font-size: 1.8em; letter-spacing: 1px; transform: translateZ(30px); }
        p { color: #94a3b8; font-size: 0.95em; margin-bottom: 35px; transform: translateZ(20px); }

        /* Google Sign In Button */
        .google-btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.4s;
            transform: translateZ(50px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .google-btn:hover {
            background: var(--accent);
            color: var(--primary);
            transform: translateZ(60px) scale(1.02);
            border-color: var(--accent);
        }

        .google-btn i {
            font-size: 1.3em;
        }

        .google-btn:active {
            transform: scale(0.98);
        }

        .or-divider {
            color: #64748b;
            margin: 25px 0;
            position: relative;
            transform: translateZ(30px);
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border);
        }

        .or-divider::before { left: 0; }
        .or-divider::after { right: 0; }

        .email-login {
            transform: translateZ(40px);
        }

        .email-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1em;
            transition: 0.3s;
            outline: none;
            text-align: left;
            padding-left: 20px;
        }

        .email-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.2);
        }

        .email-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, var(--primary), #1e3a8a);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .email-btn:hover {
            background: linear-gradient(90deg, #1e3a8a, var(--primary));
            transform: translateY(-2px);
        }

        .back-home { 
            margin-top: 30px; 
            display: block; 
            color: #64748b; 
            text-decoration: none; 
            font-size: 0.85em; 
            transition: 0.3s; 
            transform: translateZ(20px);
        }
        .back-home:hover { color: var(--accent); }

        .error-message {
            color: #ef4444;
            font-size: 0.85em;
            margin-top: 10px;
            transform: translateZ(20px);
        }

        /* Mobile View */
        @media (max-width: 480px) {
            .login-card { margin: 20px; padding: 40px 25px; }
            .google-btn { padding: 15px; }
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="static/videos/run.mp4" type="video/mp4">
    </video>

    <div class="glow"></div>

    <div class="login-card" id="login-container" data-aos="zoom-out">
        <div class="icon-box"><i class="fas fa-lock"></i></div>
        
        <h2>Welcome Back</h2>
        <p>Sign in to access your portfolio</p>

        <!-- Google Sign In Button -->
        <button class="google-btn" id="googleSignIn">
            <i class="fab fa-google"></i>
            Continue with Google
        </button>

        <div class="or-divider">OR</div>

        <!-- Email Sign In -->
        <div class="email-login">
            <input type="email" id="emailInput" class="email-input" placeholder="Enter your email" spellcheck="false">
            <button class="email-btn" id="emailSignIn">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                Continue with Email
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <a href="index.html" class="back-home"><i class="fas fa-chevron-left"></i> Return Home</a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <script>
        AOS.init({ duration: 1200 });

        // Apply 3D Tilt Effect
        VanillaTilt.init(document.querySelector(".login-card"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDrhSxPhLxbWctFRHl8XpvUPW8XMOxHiEk",
            authDomain: "tn-builders.firebaseapp.com",
            projectId: "tn-builders",
            storageBucket: "tn-builders.firebasestorage.app",
            messagingSenderId: "1092380469105",
            appId: "1:1092380469105:web:1cf22fb0d8ea44171f38d0",
            measurementId: "G-8638X3B19X"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Admin emails list
        const ADMIN_EMAILS = ["santhoshwebworker@gmail.com", "tnbuilders.designs@gmail.com"];

        // Google Sign In
        document.getElementById('googleSignIn').addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Redirect based on email
                if (ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'work.html';
                }
            } catch (error) {
                console.error("Google Sign-In Error:", error);
                document.getElementById('errorMessage').textContent = 
                    error.message || "Sign-in failed. Please try again.";
            }
        });

        // Email Sign In (sends magic link)
        document.getElementById('emailSignIn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            if (!email || !email.includes('@')) {
                errorDiv.textContent = "Please enter a valid email address";
                return;
            }

            try {
                await auth.sendSignInLinkToEmail(email, {
                    url: window.location.origin + '/work.html',
                    handleCodeInApp: true,
                });
                
                // Save email for later
                window.localStorage.setItem('emailForSignIn', email);
                
                errorDiv.style.color = '#4ade80';
                errorDiv.textContent = "Magic link sent! Check your email.";
            } catch (error) {
                console.error("Email Sign-In Error:", error);
                errorDiv.style.color = '#ef4444';
                errorDiv.textContent = error.message || "Failed to send magic link";
            }
        });

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is already signed in, redirect
                if (ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'work.html';
                }
            }
        });

        // Handle email link sign-in
        if (firebase.auth().isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('Please provide your email for confirmation');
            }
            
            auth.signInWithEmailLink(email, window.location.href)
                .then((result) => {
                    window.localStorage.removeItem('emailForSignIn');
                    if (ADMIN_EMAILS.includes(result.user.email)) {
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        window.location.href = 'work.html';
                    }
                })
                .catch((error) => {
                    console.error("Email link sign-in error:", error);
                    document.getElementById('errorMessage').textContent = 
                        "Invalid or expired magic link";
                });
        }
    </script>
</body>
</html>
