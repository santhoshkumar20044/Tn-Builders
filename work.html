<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN BUILDERS - Private Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #0d47a1; 
            --accent: #ffb300; 
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #020617; 
            color: #fff; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Video Background */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }

        /* Premium Header */
        header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px);
            padding: 15px 0; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid var(--border);
        }
        .nav-container { max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo img { height: 40px; border-radius: 8px; box-shadow: 0 0 15px var(--accent); }
        .logo h1 { color: var(--accent); font-size: 1.3em; letter-spacing: 2px; }

        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        nav ul li a { 
            color: #94a3b8; text-decoration: none; font-weight: 600; 
            padding: 10px 18px; border-radius: 12px; font-size: 0.85em; 
            transition: 0.3s; text-transform: uppercase; 
        }
        nav ul li a:hover, nav ul li a.current { background: var(--glass); color: var(--accent); }

        /* Portfolio Section */
        section { padding: 60px 20px; }
        .title-area { text-align: center; margin-bottom: 50px; }
        .title-area h2 { font-size: 2.2em; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .title-area p { color: var(--accent); font-weight: bold; margin-top: 10px; opacity: 0.8; }

        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: auto;
            perspective: 1000px;
        }

        /* 3D Glass Card */
        .card { 
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 35px; 
            border: 1px solid var(--border);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            transform-style: preserve-3d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }

        .card-icon { 
            width: 70px; height: 70px; background: rgba(13, 71, 161, 0.3);
            line-height: 70px; border-radius: 20px; margin: 0 auto 20px;
            color: var(--accent); font-size: 1.8em; transform: translateZ(30px);
        }

        .card h4 { font-size: 1.4em; color: #fff; margin-bottom: 12px; transform: translateZ(40px); }
        .card p { font-size: 0.9em; color: #94a3b8; line-height: 1.6; margin-bottom: 25px; transform: translateZ(20px); }

        /* Buttons in Card */
        .btn-group { display: flex; flex-direction: column; gap: 12px; transform: translateZ(50px); }
        .view-btn { 
            text-decoration: none; font-size: 0.85em; font-weight: bold; 
            padding: 14px; border-radius: 15px; 
            border: 1px solid var(--border); color: #fff; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            transition: 0.3s; background: rgba(255,255,255,0.02);
        }
        .view-btn:hover { background: var(--accent); color: var(--primary); border-color: var(--accent); }

        .client-info { 
            margin-top: 25px; padding: 10px; border-radius: 10px;
            background: rgba(0,0,0,0.2); font-size: 0.8em; color: var(--accent); 
        }

        /* Skeleton Loading */
        #loader { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; }

        @media (max-width: 850px) {
            .project-grid { grid-template-columns: 1fr; }
            .title-area h2 { font-size: 1.6em; }
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline><source src="static/videos/run.mp4" type="video/mp4"></video>
    </div>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="https://firebasestorage.googleapis.com/v0/b/tn-builders.firebasestorage.app/o/site-brand-logo.png?alt=media" id="main-logo" alt="Logo">
                <h1>TN BUILDERS</h1>
            </a>
            <nav>
                <ul id="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="work.html" class="current">Projects</a></li>
                    <li><a href="#" onclick="logout()" style="color: #ef5350;"><i class="fas fa-sign-out-alt"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section>
        <div class="title-area" data-aos="zoom-in">
            <h2>Authorized Access Only</h2>
            <p>Confidential Architectural Projects</p>
        </div>

        <div id="loader">Encrypting Connection...</div>
        <div class="project-grid" id="project-list"></div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <script>
        AOS.init({ duration: 1000 });

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDrhSxPhLxbWctFRHl8XpvUPW8XMOxHiEk",
            authDomain: "tn-builders.firebaseapp.com",
            projectId: "tn-builders",
            storageBucket: "tn-builders.firebasestorage.app",
            messagingSenderId: "1092380469105",
            appId: "1:1092380469105:web:1cf22fb0d8ea44171f38d0",
            measurementId: "G-8638X3B19X"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Admin emails list
        const ADMIN_EMAILS = ["santhoshwebworker@gmail.com", "tnbuilders.designs@gmail.com"];

        // Auth Guard - Check if user is logged in
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Not logged in -> Redirect to login
                alert("Please login to view projects.");
                window.location.href = 'login.html';
            } else {
                // User is logged in, fetch projects
                fetchProjects();
            }
        });

        async function fetchProjects() {
            const list = document.getElementById('project-list');
            const loader = document.getElementById('loader');

            try {
                const snapshot = await db.collection('projects')
                    .orderBy('created_at', 'desc')
                    .get();

                loader.style.display = 'none';

                if (snapshot.empty) {
                    list.innerHTML = '<p style="text-align:center; color:#94a3b8;">No projects found.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const p = doc.data();
                    const card = `
                        <div class="card" data-tilt data-tilt-max="10" data-tilt-glare data-tilt-max-glare="0.1">
                            <div class="card-icon"><i class="fas fa-layer-group"></i></div>
                            <h4>${p.title || 'Untitled Project'}</h4>
                            <p>${p.description || 'Premium structural execution with modern standards.'}</p>
                            
                            <div class="btn-group">
                                ${p.floor_pdf ? `<a href="${p.floor_pdf}" class="view-btn" target="_blank"><i class="fas fa-drafting-compass"></i> FLOOR PLAN</a>` : ''}
                                ${p.ele_pdf ? `<a href="${p.ele_pdf}" class="view-btn" target="_blank"><i class="fas fa-bolt"></i> ELECTRICAL MAP</a>` : ''}
                                ${p.plumb_pdf ? `<a href="${p.plumb_pdf}" class="view-btn" target="_blank"><i class="fas fa-faucet"></i> PLUMBING MAP</a>` : ''}
                            </div>

                            <div class="client-info"><i class="fas fa-user-check"></i> &nbsp; CLIENT: ${p.client || 'Confidential'}</div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', card);
                });

                // Re-init Tilt for dynamic content
                VanillaTilt.init(document.querySelectorAll(".card"));
            } catch (error) {
                console.error("Error fetching projects:", error);
                loader.style.display = 'none';
                list.innerHTML = '<p style="text-align:center; color:#ef4444;">Error loading projects.</p>';
            }
        }

        window.logout = async function() {
            try {
                await auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error("Logout error:", error);
            }
        };
    </script>
</body>
</html>
